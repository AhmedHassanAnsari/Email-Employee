services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      # Crash recovery after an unclean shutdown can take ~1 min on slow disks
      # (e.g. WSL2 fsync). Don't count probes as failures until then, or
      # dependents abort with "dependency failed to start".
      start_period: 120s

  workspace-mcp:
    image: ghcr.io/ahmedhassanansari/email-employee-workspace-mcp:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Bind to all interfaces so other services can reach it over the network.
      - WORKSPACE_MCP_HOST=0.0.0.0
      - WORKSPACE_MCP_PORT=8000
    expose:
      - "8000"

  backend:
    image: ghcr.io/ahmedhassanansari/email-employee-agent-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_BASE_DIR=/app
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - GMAIL_MCP_URL=http://workspace-mcp:8000/mcp
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      workspace-mcp:
        condition: service_started
    volumes:
      - ./Inbox:/app/Inbox
      - ./Approval:/app/Approval
      - ./Done:/app/Done

  email-monitor:
    image: ghcr.io/ahmedhassanansari/email-employee-email-monitor:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_BASE_DIR=/app
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - AGENT_API_BASE=http://backend:8001
      - GMAIL_MCP_URL=http://workspace-mcp:8000/mcp
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
      workspace-mcp:
        condition: service_started
    volumes:
      - ./Inbox:/app/Inbox
      - ./Approval:/app/Approval
      - ./Done:/app/Done

  frontend:
    # VITE_API_BASE is inlined into the bundle by CI at image-build time
    # (repo variable vars.VITE_API_BASE), not here — it can't be set at runtime.
    image: ghcr.io/ahmedhassanansari/email-employee-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "5173:8080"
    depends_on:
      - backend

volumes:
  pgdata: